name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  check:
    uses: ./.github/workflows/ci.yml

  build-linux:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[stl]"
      - run: pip install pyinstaller
      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name "S-Stream-linux" --windowed \
            --add-data "presets/scenes:presets/scenes" \
            --add-data "resources:resources" \
            --hidden-import PySide6.QtOpenGL \
            --hidden-import PySide6.QtOpenGLWidgets \
            --hidden-import OpenGL \
            --hidden-import OpenGL.GL \
            --hidden-import OpenGL.GLU \
            --hidden-import imageio \
            --hidden-import imageio.plugins.ffmpeg \
            --hidden-import imageio.plugins.pillow \
            --hidden-import pyqtgraph \
            --hidden-import numba \
            --hidden-import engines.lbm2d_liquid \
            --hidden-import engines.lbm2d_multicomponent \
            --hidden-import engines.lbm3d \
            --hidden-import engines.particle_tracer \
            --hidden-import engines.collision \
            --hidden-import engines.non_newtonian \
            --hidden-import engines.thermal_mixin \
            --hidden-import engines.boundary_conditions \
            --hidden-import analysis.regimes \
            --hidden-import analysis.sanity \
            --hidden-import analysis.scorecard \
            --hidden-import analysis.ai_context \
            --hidden-import analysis.sweep \
            --hidden-import analysis.physics \
            --hidden-import export.image \
            --hidden-import export.report \
            --hidden-import export.video \
            --hidden-import export.data \
            --hidden-import scene.probe \
            --hidden-import scene.serializer \
            --hidden-import presets.loader \
            --hidden-import resources.theme \
            --hidden-import resources.colormaps \
            --hidden-import workbench.panels.scene_panel \
            --hidden-import workbench.panels.analysis_panel \
            --hidden-import workbench.panels.outcome_panel \
            --hidden-import workbench.dialogs.presets_dialog \
            --hidden-import workbench.dialogs.recipes_dialog \
            --hidden-import workbench.dialogs.sweep_dialog \
            --hidden-import workbench.dialogs.export_dialog \
            --hidden-import workbench.dialogs.wizard_dialog \
            --exclude cupy --exclude cupyx --exclude cupy_backends \
            --exclude torch --exclude lettuce \
            main.py
      - uses: actions/upload-artifact@v4
        with:
          name: S-Stream-linux
          path: dist/S-Stream-linux

  build-windows:
    needs: [check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[stl]"
      - run: pip install pyinstaller
      - name: Build Windows executable
        run: |
          pyinstaller --onefile --name "S-Stream-win" --windowed `
            --add-data "presets/scenes;presets/scenes" `
            --add-data "resources;resources" `
            --hidden-import PySide6.QtOpenGL `
            --hidden-import PySide6.QtOpenGLWidgets `
            --hidden-import OpenGL `
            --hidden-import OpenGL.GL `
            --hidden-import OpenGL.GLU `
            --hidden-import imageio `
            --hidden-import imageio.plugins.ffmpeg `
            --hidden-import imageio.plugins.pillow `
            --hidden-import pyqtgraph `
            --hidden-import numba `
            --hidden-import engines.lbm2d_liquid `
            --hidden-import engines.lbm2d_multicomponent `
            --hidden-import engines.lbm3d `
            --hidden-import engines.particle_tracer `
            --hidden-import engines.collision `
            --hidden-import engines.non_newtonian `
            --hidden-import engines.thermal_mixin `
            --hidden-import engines.boundary_conditions `
            --hidden-import analysis.regimes `
            --hidden-import analysis.sanity `
            --hidden-import analysis.scorecard `
            --hidden-import analysis.ai_context `
            --hidden-import analysis.sweep `
            --hidden-import analysis.physics `
            --hidden-import export.image `
            --hidden-import export.report `
            --hidden-import export.video `
            --hidden-import export.data `
            --hidden-import scene.probe `
            --hidden-import scene.serializer `
            --hidden-import presets.loader `
            --hidden-import resources.theme `
            --hidden-import resources.colormaps `
            --hidden-import workbench.panels.scene_panel `
            --hidden-import workbench.panels.analysis_panel `
            --hidden-import workbench.panels.outcome_panel `
            --hidden-import workbench.dialogs.presets_dialog `
            --hidden-import workbench.dialogs.recipes_dialog `
            --hidden-import workbench.dialogs.sweep_dialog `
            --hidden-import workbench.dialogs.export_dialog `
            --hidden-import workbench.dialogs.wizard_dialog `
            --exclude cupy --exclude cupyx --exclude cupy_backends `
            --exclude torch --exclude lettuce `
            --icon resources\icon.ico `
            main.py
      - uses: actions/upload-artifact@v4
        with:
          name: S-Stream-windows
          path: dist/S-Stream-win.exe

  build-macos:
    needs: [check]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[stl]"
      - run: pip install pyinstaller
      - name: Build macOS binary
        run: |
          pyinstaller --onefile --name "S-Stream-macos" --windowed \
            --add-data "presets/scenes:presets/scenes" \
            --add-data "resources:resources" \
            --hidden-import PySide6.QtOpenGL \
            --hidden-import PySide6.QtOpenGLWidgets \
            --hidden-import OpenGL \
            --hidden-import OpenGL.GL \
            --hidden-import OpenGL.GLU \
            --hidden-import imageio \
            --hidden-import imageio.plugins.ffmpeg \
            --hidden-import imageio.plugins.pillow \
            --hidden-import pyqtgraph \
            --hidden-import numba \
            --hidden-import engines.lbm2d_liquid \
            --hidden-import engines.lbm2d_multicomponent \
            --hidden-import engines.lbm3d \
            --hidden-import engines.particle_tracer \
            --hidden-import engines.collision \
            --hidden-import engines.non_newtonian \
            --hidden-import engines.thermal_mixin \
            --hidden-import engines.boundary_conditions \
            --hidden-import analysis.regimes \
            --hidden-import analysis.sanity \
            --hidden-import analysis.scorecard \
            --hidden-import analysis.ai_context \
            --hidden-import analysis.sweep \
            --hidden-import analysis.physics \
            --hidden-import export.image \
            --hidden-import export.report \
            --hidden-import export.video \
            --hidden-import export.data \
            --hidden-import scene.probe \
            --hidden-import scene.serializer \
            --hidden-import presets.loader \
            --hidden-import resources.theme \
            --hidden-import resources.colormaps \
            --hidden-import workbench.panels.scene_panel \
            --hidden-import workbench.panels.analysis_panel \
            --hidden-import workbench.panels.outcome_panel \
            --hidden-import workbench.dialogs.presets_dialog \
            --hidden-import workbench.dialogs.recipes_dialog \
            --hidden-import workbench.dialogs.sweep_dialog \
            --hidden-import workbench.dialogs.export_dialog \
            --hidden-import workbench.dialogs.wizard_dialog \
            --exclude cupy --exclude cupyx --exclude cupy_backends \
            --exclude torch --exclude lettuce \
            main.py
      - uses: actions/upload-artifact@v4
        with:
          name: S-Stream-macos
          path: dist/S-Stream-macos

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: S-Stream-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: S-Stream-windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: S-Stream-macos
          path: artifacts/macos
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_errors: true
          files: |
            artifacts/linux/S-Stream-linux
            artifacts/windows/S-Stream-win.exe
            artifacts/macos/S-Stream-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
